<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baby Shower – Belén</title>

  <!-- Vista previa al compartir el link -->
  <meta property="og:title"       content="Baby Shower de Belén 🎀" />
  <meta property="og:description" content="Te invitamos a celebrar la llegada de nuestra pequeña. Sábado 27 de Junio, 15:00 hrs." />
  <meta property="og:image"       content="https://kevinaovidio-beep.github.io/babyshowerbelenelisa/banner.png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url"         content="https://kevinaovidio-beep.github.io/babyshowerbelenelisa/" />
  <meta property="og:type"        content="website" />
  <meta name="twitter:card"       content="summary_large_image" />
  <meta name="twitter:image"      content="https://kevinaovidio-beep.github.io/babyshowerbelenelisa/banner.png" />

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@700;900&family=Lato:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink-light:   #fce4ec;
      --pink-mid:     #f48fb1;
      --pink-deep:    #e57399;
      --pink-ribbon:  #e8799a;
      --blush:        #fdf0f3;
      --brown:        #8b5e3c;
      --brown-dark:   #5c3d1e;
      --gold:         #c9a96e;
      --text-main:    #5c3d2e;
      --text-accent:  #e57399;
    }

    html, body {
      min-height: 100%;
      background: #f9eef2;
      font-family: 'Lato', sans-serif;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* ── CARD ── */
    .card {
      position: relative;
      width: min(480px, 100vw);
      min-height: 100vh;
      background: linear-gradient(175deg, #fff5f8 0%, #fdeef4 40%, #fff9f5 100%);
      overflow: hidden;
      padding-bottom: 40px;
      box-shadow: 0 8px 60px rgba(220,100,140,.25);
    }

    /* ── FLOATING PETALS ── */
    .petal {
      position: absolute;
      width: 18px; height: 18px;
      border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
      opacity: .35;
      animation: petalFall linear infinite;
      pointer-events: none;
    }
    @keyframes petalFall {
      0%   { transform: translateY(-30px) rotate(0deg);   opacity: .0; }
      10%  { opacity: .4; }
      90%  { opacity: .3; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* ── TOP FLORAL CORNERS ── */
    .floral-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 180px;
      pointer-events: none;
      z-index: 2;
    }
    .floral-top svg { width: 100%; height: 100%; }

    /* ── BEAR SECTION ── */
    .bear-zone {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 130px;
    }

    /* Gold arch */
    .arch {
      position: absolute;
      top: 60px;
      width: 200px; height: 170px;
      border: 3.5px solid var(--gold);
      border-bottom: none;
      border-radius: 100px 100px 0 0;
      animation: archGlow 3s ease-in-out infinite alternate;
    }
    @keyframes archGlow {
      from { box-shadow: 0 0 6px rgba(201,169,110,.3); }
      to   { box-shadow: 0 0 18px rgba(201,169,110,.6); }
    }

    .bear-img {
      width: 150px;
      position: relative;
      z-index: 1;
      animation: bearFloat 4s ease-in-out infinite;
      filter: drop-shadow(0 6px 12px rgba(139,94,60,.18));
    }
    @keyframes bearFloat {
      0%, 100% { transform: translateY(0px);  }
      50%       { transform: translateY(-10px); }
    }

    /* ── RIBBON ── */
    .ribbon-wrap {
      position: relative;
      z-index: 4;
      width: 260px;
      margin-top: -22px;
    }
    .ribbon-wrap svg { width: 100%; }

    .ribbon-name {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Great Vibes', cursive;
      font-size: 2.6rem;
      color: #fff;
      text-shadow: 0 2px 8px rgba(180,60,100,.35);
      letter-spacing: 2px;
    }

    /* ── TITLE ── */
    .title-section {
      text-align: center;
      padding: 10px 24px 0;
      position: relative;
      z-index: 3;
    }
    .title-main {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      font-weight: 900;
      color: var(--pink-deep);
      letter-spacing: 3px;
      text-transform: uppercase;
      line-height: 1;
    }
    .subtitle {
      font-family: 'Lato', sans-serif;
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--brown);
      max-width: 260px;
      margin: 10px auto 0;
      line-height: 1.6;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 70%;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 16px auto;
    }

    /* ── DATE ROW ── */
    .date-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0;
      padding: 0 28px;
      position: relative;
      z-index: 3;
    }
    .date-col {
      flex: 1;
      text-align: center;
    }
    .date-label {
      font-size: .65rem;
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--brown);
      display: block;
      margin-bottom: 2px;
    }
    .date-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--brown-dark);
      display: block;
    }
    .date-big {
      font-family: 'Playfair Display', serif;
      font-size: 4.5rem;
      font-weight: 900;
      color: var(--brown-dark);
      line-height: 1;
      display: block;
      text-align: center;
    }
    .date-sub {
      font-size: .65rem;
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--brown);
      text-align: center;
      margin-top: 2px;
    }
    .vline {
      width: 1px;
      height: 50px;
      background: var(--gold);
      margin: 0 12px;
      flex-shrink: 0;
    }

    /* ── PACIFIER ── */
    .pacifier-row {
      display: flex;
      justify-content: center;
      margin: 8px 0 4px;
      position: relative;
      z-index: 3;
    }
    .pacifier-row svg {
      width: 52px;
      animation: pacifierSpin 6s ease-in-out infinite;
    }
    @keyframes pacifierSpin {
      0%,100% { transform: rotate(-8deg); }
      50%      { transform: rotate(8deg); }
    }

    /* ── BUTTON SECTION ── */
    .btn-section {
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding: 8px 32px 0;
      position: relative;
      z-index: 5;
      gap: 16px;
    }
    .btn-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .btn-col-label {
      font-size: .65rem;
      font-weight: 900;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--brown);
      text-align: center;
    }
    .btn-invite {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 50px;
      font-family: 'Lato', sans-serif;
      font-size: .75rem;
      font-weight: 900;
      letter-spacing: .1em;
      text-transform: uppercase;
      text-decoration: none;
      color: #fff;
      text-align: center;
      transition: transform .2s, box-shadow .2s;
      cursor: pointer;
    }
    .btn-invite:hover { transform: translateY(-2px) scale(1.04); }
    .btn-confirm {
      background: linear-gradient(135deg, #e8799a, #d45f82);
      box-shadow: 0 4px 16px rgba(212,95,130,.4);
    }
    .btn-confirm:hover { box-shadow: 0 6px 20px rgba(212,95,130,.6); }
    .btn-location {
      background: linear-gradient(135deg, #c9a96e, #a8845a);
      box-shadow: 0 4px 16px rgba(168,132,90,.4);
    }
    .btn-location:hover { box-shadow: 0 6px 20px rgba(168,132,90,.6); }

    /* ── PARENTS ── */
    .parents-section {
      text-align: center;
      padding: 20px 24px 0;
      position: relative;
      z-index: 3;
    }
    .parents-title {
      font-family: 'Great Vibes', cursive;
      font-size: 1.8rem;
      color: var(--brown-dark);
      text-decoration: underline;
      text-underline-offset: 4px;
    }
    .parents-names {
      font-family: 'Great Vibes', cursive;
      font-size: 2.1rem;
      color: var(--brown-dark);
      margin-top: 2px;
    }
    .te-esperamos {
      font-family: 'Great Vibes', cursive;
      font-size: 2.6rem;
      color: var(--brown-dark);
      margin-top: 6px;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1;   transform: scale(1);    }
      50%      { opacity: .85; transform: scale(1.03); }
    }

    /* ── BOTTOM CORNER BEARS ── */
    .bottom-zone {
      position: relative;
      height: 160px;
      margin-top: 10px;
      z-index: 3;
    }
    .bear-left, .bear-right {
      position: absolute;
      bottom: 0;
      width: 110px;
    }
    .bear-left  { left: -8px;  animation: bearFloat 5s ease-in-out infinite; }
    .bear-right { right: -8px; animation: bearFloat 5s ease-in-out infinite .8s; }

    /* ── BOTTOM FLORAL ── */
    .floral-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      z-index: 2;
      pointer-events: none;
    }

    /* ── SIDE BALLOONS ── */
    .balloon {
      position: absolute;
      pointer-events: none;
      z-index: 1;
    }
    .balloon-left  { left: -5px;  bottom: 120px; }
    .balloon-right { right: -5px; bottom: 120px; }
    .balloon svg { animation: balFloat 5s ease-in-out infinite; }
    .balloon-right svg { animation: balFloat 5s ease-in-out infinite .6s; }
    @keyframes balFloat {
      0%,100% { transform: translateY(0);   }
      50%      { transform: translateY(-14px); }
    }

    /* ── STARS ── */
    .star {
      position: absolute;
      pointer-events: none;
      z-index: 2;
      animation: starPop 2.5s ease-in-out infinite;
    }
    @keyframes starPop {
      0%,100% { transform: scale(1)   rotate(0deg);  opacity: .8; }
      50%      { transform: scale(1.3) rotate(20deg); opacity: 1;  }
    }

    /* ── MUSIC BUTTON ── */
    #music-btn {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      background: radial-gradient(circle at 40% 35%, #fff0f5 0%, #f9c2d4 60%, #e8799a 100%);
      border: 2.5px solid #e8799a;
      border-radius: 50px;
      padding: 7px 16px 6px;
      cursor: pointer;
      box-shadow: 0 3px 14px rgba(232,121,154,.45), inset 0 1px 3px rgba(255,255,255,.6);
      transition: transform .2s, box-shadow .2s, background .3s;
      outline: none;
    }
    #music-btn:hover { transform: translateX(-50%) scale(1.08); box-shadow: 0 5px 20px rgba(232,121,154,.6); }
    #music-btn:active { transform: translateX(-50%) scale(.96); }
    #music-btn.playing { background: radial-gradient(circle at 40% 35%, #fff0f5 0%, #f4a8c0 60%, #d4607a 100%); border-color: #d4607a; animation: btnPulse 1.8s ease-in-out infinite; }
    @keyframes btnPulse { 0%,100% { box-shadow: 0 3px 14px rgba(212,96,122,.45); } 50% { box-shadow: 0 3px 22px rgba(212,96,122,.75), 0 0 0 6px rgba(212,96,122,.12); } }
    #music-icon { font-size: 1.3rem; color: #b3405e; line-height: 1; display: block; transition: transform .3s; }
    #music-btn.playing #music-icon { animation: noteWiggle 0.6s ease-in-out infinite alternate; }
    @keyframes noteWiggle { from { transform: rotate(-12deg) scale(1); } to { transform: rotate(12deg) scale(1.15); } }
    #music-label { font-family: 'Lato', sans-serif; font-size: .58rem; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; color: #b3405e; line-height: 1; }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
</head>
<body>
<div class="card" id="card">

  <!-- ══ FLOATING PETALS (JS injected) ══ -->

  <!-- ══ TOP FLORAL CORNERS ══ -->
  <div class="floral-top">
    <svg viewBox="0 0 480 180" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">

      <g opacity=".92">

      <g opacity=".92" transform="translate(480,0) scale(-1,1)">
        <ellipse cx="18" cy="30" rx="28" ry="22" fill="#f9b8c8" transform="rotate(-20,18,30)"/>
        <ellipse cx="18" cy="30" rx="14" ry="10" fill="#f48fb1" transform="rotate(-20,18,30)"/>
        <ellipse cx="55" cy="12" rx="22" ry="18" fill="#f8a8bf" transform="rotate(15,55,12)"/>
        <ellipse cx="55" cy="12" rx="11" ry="8"  fill="#e57399" transform="rotate(15,55,12)"/>
        <ellipse cx="10" cy="70" rx="20" ry="16" fill="#fbc8d4" transform="rotate(10,10,70)"/>
        <ellipse cx="10" cy="70" rx="10" ry="7"  fill="#f48fb1" transform="rotate(10,10,70)"/>
        <ellipse cx="80" cy="45" rx="17" ry="14" fill="#f9c9d5" transform="rotate(-30,80,45)"/>
        <ellipse cx="80" cy="45" rx="8"  ry="6"  fill="#e8799a" transform="rotate(-30,80,45)"/>
        <ellipse cx="40" cy="80" rx="18" ry="14" fill="#d97b9a" transform="rotate(5,40,80)"/>
        <ellipse cx="40" cy="80" rx="9"  ry="7"  fill="#b3526e" transform="rotate(5,40,80)"/>
        <ellipse cx="60" cy="60" rx="22" ry="8"  fill="#a8b87a" opacity=".7" transform="rotate(-40,60,60)"/>
        <ellipse cx="35" cy="50" rx="18" ry="6"  fill="#c9a96e" opacity=".6" transform="rotate(20,35,50)"/>
        <ellipse cx="15" cy="100" rx="16" ry="5" fill="#a8b87a" opacity=".6" transform="rotate(-10,15,100)"/>
      </g>
    </svg>
  </div>

  <!-- ══ STARS ══ -->
  <div class="star" style="top:188px;left:30px;"><svg width="24" height="24" viewBox="0 0 24 24"><polygon points="12,2 14.9,9.3 22.6,9.3 16.8,14.1 18.9,21.8 12,17.5 5.1,21.8 7.2,14.1 1.4,9.3 9.1,9.3" fill="#f8c8d5" stroke="#e57399" stroke-width=".5"/></svg></div>
  <div class="star" style="top:210px;right:30px;animation-delay:.7s"><svg width="20" height="20" viewBox="0 0 24 24"><polygon points="12,2 14.9,9.3 22.6,9.3 16.8,14.1 18.9,21.8 12,17.5 5.1,21.8 7.2,14.1 1.4,9.3 9.1,9.3" fill="#f8c8d5" stroke="#e57399" stroke-width=".5"/></svg></div>
  <div class="star" style="top:175px;left:55px;animation-delay:1.2s"><svg width="14" height="14" viewBox="0 0 24 24"><polygon points="12,2 14.9,9.3 22.6,9.3 16.8,14.1 18.9,21.8 12,17.5 5.1,21.8 7.2,14.1 1.4,9.3 9.1,9.3" fill="#c9a96e" stroke="#a8845a" stroke-width=".5"/></svg></div>
  <div class="star" style="top:175px;right:55px;animation-delay:1.8s"><svg width="14" height="14" viewBox="0 0 24 24"><polygon points="12,2 14.9,9.3 22.6,9.3 16.8,14.1 18.9,21.8 12,17.5 5.1,21.8 7.2,14.1 1.4,9.3 9.1,9.3" fill="#c9a96e" stroke="#a8845a" stroke-width=".5"/></svg></div>

  <!-- ══ BEAR + ARCH ══ -->
  <div class="bear-zone">
    <div class="arch"></div>
    <!-- SVG bear (illustration) -->
    <svg class="bear-img" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
      <!-- body -->
      <ellipse cx="100" cy="155" rx="55" ry="60" fill="#d4956a"/>
      <!-- belly -->
      <ellipse cx="100" cy="165" rx="35" ry="40" fill="#e8b48a"/>
      <!-- head -->

      <!-- ears -->
      <circle cx="58"  cy="60" r="18" fill="#d4956a"/>
      <circle cx="58"  cy="60" r="11" fill="#e8b48a"/>
      <circle cx="142" cy="60" r="18" fill="#d4956a"/>
      <circle cx="142" cy="60" r="11" fill="#e8b48a"/>

  </div>

  <!-- Music button: top center of card -->

  <!-- Audio -->
  <audio id="bg-audio" loop preload="auto">
    <source src="cancion.mp3" type="audio/mpeg">
  </audio>

  <!-- ══ RIBBON ══ -->
  <div class="ribbon-wrap" style="position:relative;z-index:4;width:280px;margin:-22px auto 0;">
    <svg viewBox="0 0 280 70" xmlns="http://www.w3.org/2000/svg">
      <!-- ribbon tails -->
      <polygon points="0,10 30,35 0,60" fill="#d4607a"/>
      <polygon points="280,10 250,35 280,60" fill="#d4607a"/>
      <!-- main ribbon body -->
      <rect x="15" y="8" width="250" height="54" rx="4" fill="#e8799a"/>
      <rect x="15" y="8" width="250" height="54" rx="4" fill="url(#ribbonShine)"/>

          <stop offset="0.5" stop-color="#fff" stop-opacity="0"/>
          <stop offset="1"   stop-color="#000" stop-opacity=".08"/>

      </defs>

      <line x1="140" y1="8" x2="140" y2="62" stroke="#d4607a" stroke-width="2" opacity=".4"/>

    <div class="ribbon-name">Belén</div>

  <!-- ══ TITLE ══ -->

<script>
  // ── Music
  const audio = document.getElementById('bg-audio');
  const btn   = document.getElementById('music-btn');
  const icon  = document.getElementById('music-icon');
  const label = document.getElementById('music-label');

  let unlocked = false;

  function setPlaying(playing) {
    if (playing) {
      btn.classList.add('playing');
      icon.textContent  = '❚❚';
      label.textContent = 'Pausar';
    } else {
      btn.classList.remove('playing');
      icon.textContent  = '♪';
      label.textContent = 'Música';
    }
  }

  function startAudio() {
    audio.muted  = false;
    audio.volume = 0.7;
    audio.play()
      .then(() => setPlaying(true))
      .catch(() => setPlaying(false));
  }

  // Try muted autoplay immediately on load
  window.addEventListener('load', () => {
    audio.muted = true;
    audio.play().catch(() => {});
  });

  // Unlock on ANY user interaction
  function unlockAudio() {
    if (unlocked) return;
    unlocked = true;
    audio.muted = false;
    if (audio.paused) {
      audio.play()
        .then(() => setPlaying(true))
        .catch(() => setPlaying(false));
    } else {
      setPlaying(true);
    }
    ['click','touchstart','touchend','keydown','pointerdown'].forEach(ev => {
      document.removeEventListener(ev, unlockAudio);
    });
  }
  ['click','touchstart','touchend','keydown','pointerdown'].forEach(ev => {
    document.addEventListener(ev, unlockAudio, { once: true, passive: true });
  });

  // Button: toggle play/pause
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!unlocked) {
      unlocked = true;
      startAudio();
    } else if (audio.paused) {
      audio.play().then(() => setPlaying(true)).catch(() => {});
    } else {
      audio.pause();
      setPlaying(false);
    }
  });

  // ── Floating petals
  const card = document.getElementById('card');
  const colors = ['#f9b8c8','#fce4ec','#f48fb1','#e8b48a','#fbc8d4','#e8799a','#d4b896'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.cssText = `
      left: ${Math.random()*100}%;
      top: ${Math.random()*-20}px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${12+Math.random()*14}px;
      height: ${12+Math.random()*14}px;
      animation-duration: ${6+Math.random()*8}s;
      animation-delay: ${Math.random()*8}s;
    `;
    card.appendChild(p);
  }
</script>
